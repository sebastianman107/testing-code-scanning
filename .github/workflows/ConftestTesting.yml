name: Hydra authz testing Conftest

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read
 
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  hydra-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz
          echo "e8144c6d6d2ae0260b869caa60c7c262a1f95ac63ec1e5d2fb19be452d606347  conftest.tar.gz" | sha256sum -c
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest
        id: conftest
        run: |
          conftest test . --ignore=".github" --output sarif | tee results.sarif
          conftest test . --ignore=".github|results.json" --output json | tee results.json
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));

            const failures = results.flatMap(r => r.failures || []);
            const warnings = results.flatMap(r => r.warnings || []);

            if (failures.length === 0 && warnings.length === 0) return;

            let body = '## Hydra Policy Check\n\n';
            if (failures.length > 0) {
              body += '### 🔴 High Severity\n';
              failures.forEach(f => body += `- ${f.msg}\n`);
            }
            if (warnings.length > 0) {
              body += '\n### 🟡 Warnings\n';
              warnings.forEach(w => body += `- ${w.msg}\n`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Filter SARIF
        uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
        with:
          severity: error
          input: results.sarif
          output: results.sarif

      - name: Upload Conftest SARIF report
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
